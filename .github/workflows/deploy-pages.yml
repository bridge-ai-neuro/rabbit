# Publishes site/ to GitHub Pages on every push to main. Prunes the dev/build
# extras (hero_build/, node_check/, and the ONNX weight that's served from
# Hugging Face) so the published site stays small.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prune to a clean publish tree (~45 MB)
        run: |
          rsync -a --delete \
            --exclude 'assets/hero_build/' \
            --exclude 'demo/node_check/' \
            --exclude 'serve.mjs' \
            --exclude 'demo/serve.mjs' \
            --exclude 'README.md' \
            --exclude 'demo/README.md' \
            --exclude 'assets/hero_rabbit.gif' \
            --exclude '*.onnx' \
            site/ _site/
          touch _site/.nojekyll
          echo "Published tree size:"; du -sh _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
